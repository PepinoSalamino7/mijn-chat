<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Pro - Global Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --dark-bg: #111b21;
            --dark-sidebar: #202c33;
            --wa-green: #00a884;
            --msg-out: #005c4b;
            --msg-in: #202c33;
        }
        body { background-color: #0c1317; color: #e9edef; font-family: 'Segoe UI', sans-serif; }
        .chat-wallpaper {
            background-color: #0b141a;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-blend-mode: overlay;
        }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #374151; }
        .message-bubble { max-width: 65%; padding: 8px 12px; border-radius: 8px; font-size: 14px; position: relative; }
    </style>
</head>
<body class="h-screen flex items-center justify-center overflow-hidden">

    <div id="login-screen" class="fixed inset-0 bg-[#111b21] z-50 flex items-center justify-center">
        <div class="bg-[#2a3942] p-10 rounded-lg shadow-2xl w-96 text-center border border-gray-700">
            <div class="w-20 h-20 bg-[#00a884] rounded-full mx-auto mb-6 flex items-center justify-center text-4xl"><i class="fab fa-whatsapp"></i></div>
            <h1 class="text-2xl mb-6">Welkom bij de Hub</h1>
            <input id="user-name" type="text" placeholder="Je naam..." class="w-full bg-[#3b4a54] p-3 rounded mb-4 outline-none border-b-2 border-transparent focus:border-[#00a884]">
            <button onclick="startApp()" class="w-full bg-[#00a884] py-3 rounded font-bold hover:bg-[#06cf9c]">Deelnemen</button>
        </div>
    </div>

    <div class="w-full h-full max-w-[1600px] flex shadow-2xl border border-gray-700">
        
        <div class="w-full md:w-[400px] bg-[#111b21] flex flex-col border-r border-gray-700">
            <header class="h-[60px] bg-[#202c33] px-4 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div id="my-pfp" class="w-10 h-10 bg-gray-600 rounded-full flex items-center justify-center font-bold">?</div>
                    <div class="flex flex-col">
                        <span id="display-name" class="text-sm font-medium">Laden...</span>
                        <span id="display-id" class="text-[10px] text-gray-400 font-mono"></span>
                    </div>
                </div>
                <div class="flex gap-4 text-gray-400">
                    <button onclick="createNewChat()" title="Vriend toevoegen"><i class="fas fa-user-plus"></i></button>
                    <i class="fas fa-ellipsis-v"></i>
                </div>
            </header>

            <div id="chat-list" class="flex-1 overflow-y-auto custom-scroll bg-[#111b21]">
                </div>
        </div>

        <div id="welcome-view" class="hidden md:flex flex-1 bg-[#222e35] flex-col items-center justify-center border-b-4 border-[#00a884]">
            <i class="fab fa-whatsapp text-9xl opacity-10 mb-6"></i>
            <h2 class="text-2xl font-light">Selecteer de Algemene Chat om te beginnen</h2>
        </div>

        <div id="chat-view" class="hidden flex-1 flex flex-col relative">
            <header class="h-[60px] bg-[#202c33] px-4 flex items-center justify-between shadow-md">
                <div class="flex items-center gap-3">
                    <div id="target-pfp" class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center font-bold">A</div>
                    <div>
                        <h2 id="target-name" class="font-medium">Groep</h2>
                        <p class="text-xs text-[#00a884]">Iedereen is hier aanwezig</p>
                    </div>
                </div>
            </header>

            <div id="msg-window" class="flex-1 chat-wallpaper p-6 overflow-y-auto custom-scroll flex flex-col gap-2"></div>

            <footer class="bg-[#202c33] p-3 flex items-center gap-3">
                <input id="chat-input" type="text" placeholder="Typ een bericht" class="flex-1 bg-[#2a3942] p-2.5 rounded-lg outline-none text-sm">
                <button id="send-btn" class="w-10 h-10 text-[#8696a0] hover:text-[#00a884] text-xl">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </footer>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot, orderBy, serverTimestamp, doc, setDoc, updateDoc, getDocs, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAQCDFMPwBjvmCOkRl2ACAOZ-Zgxfq_93c",
            authDomain: "gamehub-3c85a.firebaseapp.com",
            projectId: "gamehub-3c85a",
            storageBucket: "gamehub-3c85a.firebasestorage.app",
            messagingSenderId: "267598014891",
            appId: "1:267598014891:web:e7e89bcf370fa69c0ecaee"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUser = JSON.parse(localStorage.getItem('wa_user_v2')) || null;
        let activeChatId = null;
        let unsubMessages = null;

        const GLOBAL_CHAT_ID = "GLOBAL_CHAT_ROOM";

        window.startApp = async () => {
            const name = document.getElementById('user-name').value.trim();
            if (!name) return;

            const id = "ID-" + Math.floor(1000 + Math.random() * 9000);
            currentUser = { id, name };
            
            // 1. Maak gebruiker aan
            await setDoc(doc(db, "users", id), currentUser);
            
            // 2. Zorg dat Global Chat bestaat en voeg gebruiker toe
            const globalRef = doc(db, "groups", GLOBAL_CHAT_ID);
            const globalSnap = await getDocs(query(collection(db, "groups"), where("__name__", "==", GLOBAL_CHAT_ID)));
            
            if (globalSnap.empty) {
                await setDoc(globalRef, {
                    name: "🌍 Algemene Chat",
                    members: [id],
                    lastMsg: "Welkom in de algemene groep!",
                    timestamp: serverTimestamp()
                });
            } else {
                await updateDoc(globalRef, {
                    members: arrayUnion(id)
                });
            }

            localStorage.setItem('wa_user_v2', JSON.stringify(currentUser));
            location.reload();
        };

        if (currentUser) {
            document.getElementById('login-screen').classList.add('hidden');
            init();
        }

        function init() {
            document.getElementById('display-name').innerText = currentUser.name;
            document.getElementById('display-id').innerText = currentUser.id;
            document.getElementById('my-pfp').innerText = currentUser.name[0];
            listenToChats();
        }

        window.createNewChat = async () => {
            const friendId = prompt("ID van vriend?");
            const name = prompt("Naam van gesprek?");
            if (friendId && name) {
                await addDoc(collection(db, "groups"), {
                    name: name,
                    members: [currentUser.id, friendId],
                    lastMsg: "Chat gestart",
                    timestamp: serverTimestamp()
                });
            }
        };

        function listenToChats() {
            const q = query(collection(db, "groups"), where("members", "array-contains", currentUser.id), orderBy("timestamp", "desc"));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('chat-list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const div = document.createElement('div');
                    div.className = `p-4 border-b border-[#222e35] flex items-center gap-3 cursor-pointer hover:bg-[#202c33] ${doc.id === activeChatId ? 'bg-[#2a3942]' : ''}`;
                    div.innerHTML = `<div class="w-12 h-12 bg-emerald-600 rounded-full flex items-center justify-center font-bold">${d.name[0]}</div>
                                     <div class="flex-1 truncate"><p class="font-medium">${d.name}</p><p class="text-xs text-gray-500 truncate">${d.lastMsg}</p></div>`;
                    div.onclick = () => openChat(doc.id, d.name);
                    list.appendChild(div);
                });
            });
        }

        function openChat(id, name) {
            activeChatId = id;
            document.getElementById('welcome-view').classList.add('hidden');
            document.getElementById('chat-view').classList.remove('hidden');
            document.getElementById('target-name').innerText = name;
            
            if (unsubMessages) unsubMessages();
            const q = query(collection(db, `groups/${id}/messages`), orderBy("timestamp", "asc"));
            unsubMessages = onSnapshot(q, (snap) => {
                const win = document.getElementById('msg-window');
                win.innerHTML = "";
                snap.forEach(doc => {
                    const m = doc.data();
                    const isMe = m.senderId === currentUser.id;
                    win.insertAdjacentHTML('beforeend', `
                        <div class="flex ${isMe ? 'justify-end' : 'justify-start'}">
                            <div class="message-bubble ${isMe ? 'bg-[#005c4b]' : 'bg-[#202c33]'} shadow-sm">
                                <p class="text-[10px] text-emerald-400 mb-1 ${isMe ? 'hidden' : ''}">${m.senderName}</p>
                                <p>${m.text}</p>
                            </div>
                        </div>
                    `);
                });
                win.scrollTop = win.scrollHeight;
            });
        }

        async function send() {
            const input = document.getElementById('chat-input');
            if (!input.value || !activeChatId) return;
            const text = input.value;
            input.value = "";
            await addDoc(collection(db, `groups/${activeChatId}/messages`), {
                text, senderId: currentUser.id, senderName: currentUser.name, timestamp: serverTimestamp()
            });
            await updateDoc(doc(db, "groups", activeChatId), { lastMsg: text, timestamp: serverTimestamp() });
        }

        document.getElementById('send-btn').onclick = send;
        document.getElementById('chat-input').onkeypress = (e) => e.key === 'Enter' && send();

    </script>
</body>
</html>
